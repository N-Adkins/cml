name: test

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: CPU / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenBLAS (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --config Debug

      - name: Test
        run: ctest --test-dir build --build-config Debug --output-on-failure

  # CUDA build verification on GitHub-hosted runners. These machines do not
  # have a GPU, so the CUDA-specific tests (cuda_parity, the cuda_* cases in
  # test_integration) self-skip via TEST_IGNORE; what we cover here is that
  # the CUDA build compiles and links cleanly and that the non-device tests
  # still pass when CUDA is enabled.
  #
  # To run the CUDA tests against real hardware, point `runs-on` at a
  # self-hosted runner labeled with the appropriate GPU tag, e.g.
  #   runs-on: [self-hosted, linux, cuda]
  build-and-test-cuda:
    name: CUDA / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenBLAS (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "13.0.0"

      - name: Configure (CUDA)
        run: cmake -S . -B build-cuda -DCMAKE_BUILD_TYPE=Debug -DCML_ENABLE_CUDA=ON

      - name: Build (CUDA)
        run: cmake --build build-cuda --config Debug

      - name: Test (CUDA)
        run: ctest --test-dir build-cuda --build-config Debug --output-on-failure
